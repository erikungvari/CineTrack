version: "3.8"

services:
  cassandra:
    image: cassandra:4.1
    container_name: cinetrack-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./cassandra/init.cql:/docker-entrypoint-initdb.d/init.cql
    environment:
      - CASSANDRA_CLUSTER_NAME=CineTrackCluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces'"]
      interval: 15s
      timeout: 10s
      retries: 10

  cassandra-init:
    image: cassandra:4.1
    container_name: cinetrack-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./cassandra/init.cql:/init.cql
      - ./cassandra/seed.cql:/seed.cql
    entrypoint: >
      bash -c "
        echo 'Waiting for Cassandra...' &&
        until cqlsh cassandra -e 'describe keyspaces'; do sleep 5; done &&
        echo 'Running schema...' &&
        cqlsh cassandra -f /init.cql &&
        echo 'Running seed data...' &&
        cqlsh cassandra -f /seed.cql &&
        echo 'Done!'
      "

  backend:
    build: ./Backend
    container_name: cinetrack-backend
    ports:
      - "3001:3001"
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      - CASSANDRA_CONTACT_POINTS=cassandra
      - CASSANDRA_LOCAL_DC=dc1
      - CASSANDRA_KEYSPACE=cinetrack
      - PORT=3001
    restart: unless-stopped

  frontend:
    build: ./Frontend
    container_name: cinetrack-frontend
    ports:
      - "3002:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:3001/api
    restart: unless-stopped

volumes:
  cassandra_data:
